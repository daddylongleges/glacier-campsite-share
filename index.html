async function fetchListings(){
  // Use MST (UTC-7 MDT / UTC-6 MST) — expire listings at 5pm MST same day
  var now = new Date();
  // MST is UTC-7 during MDT (Mar-Nov), UTC-7 standard. Use fixed UTC-6 for MST standard, but
  // Glacier is in MDT (UTC-6) in summer season. We use UTC-6 (MDT) as the park offset.
  var mstOffset = 6 * 60; // MDT = UTC-6
  var mst = new Date(now.getTime() - mstOffset * 60 * 1000);
  var mstHour = mst.getUTCHours();
  var mstMinute = mst.getUTCMinutes();
  var mstDateStr = mst.toISOString().split('T')[0];
  // After 5pm MST, treat today as expired — use tomorrow as the floor
  var cutoffDate;
  if(mstHour >= 17){
    var next = new Date(mst);
    next.setUTCDate(next.getUTCDate() + 1);
    cutoffDate = next.toISOString().split('T')[0];
  } else {
    cutoffDate = mstDateStr;
  }
  const {data:listings,error} = await db.from('listings').select('*, claimers(*)').gte('date',cutoffDate).order('name').order('date');
  if(error){console.error(error);return [];}
  return listings.map(l=>({...l,claimers:l.claimers||[]}));
}

async function fetchStats(){
  var res = await db.from('listings').select('permit, claimers(trail, real)');
  if(res.error || !res.data) return {permitsShared:0,campsitesShared:0,hikersHelped:0};
  var data = res.data;
  var posterKeys = {};
  data.forEach(function(l){ var k=(l.permit||'').toLowerCase().trim(); if(k) posterKeys[k]=1; });
  var campsitesShared = data.filter(function(l){ return l.claimers && l.claimers.length > 0; }).length;
  var claimerKeys = {};
  data.forEach(function(l){
    (l.claimers||[]).forEach(function(c){
      var k=(c.trail||'').toLowerCase().trim()+'|'+(c.real||'').toLowerCase().trim();
      claimerKeys[k]=1;
    });
  });
  return {permitsShared:Object.keys(posterKeys).length, campsitesShared:campsitesShared, hikersHelped:Object.keys(claimerKeys).length};
}

function App(){
  const [entered,setEntered]=useState(false);
  const [page,setPage]=useState('browse');
  const [listings,setListings]=useState([]);
  const [loading,setLoading]=useState(true);
  const [myClaims,setMyClaims]=useState(()=>getStoredClaims());
  // initialise from localStorage so interest persists across refreshes
  const [myInterests,setMyInterests]=useState(()=>getStoredInterests());
  const [stats,setStats]=useState(null);

  useEffect(function(){
    fetchStats().then(function(s){setStats(s);});
  },[]);

  function refreshStats(){
    fetchStats().then(function(s){setStats(s);});
  }

  useEffect(()=>{
    if(!entered)return;
    setLoading(true);
    fetchListings().then(data=>{setListings(data);setLoading(false);});
  },[entered]);

  useEffect(()=>{
    if(!entered||page!=='browse')return;
    fetchListings().then(data=>setListings(data));
  },[page]);

  async function handleClaim(id,trail,real){
    const {data:claimer,error}=await db.from('claimers').insert([{listing_id:id,trail,real}]).select().single();
    if(error){console.error(error);return;}
    const listing=listings.find(s=>s.id===id);
    if(listing) await db.from('listings').update({spots:Math.max(0,listing.spots-1)}).eq('id',id);
    saveClaim(id, claimer.id);
    setMyClaims(p=>({...p,[id]:claimer.id}));refreshStats();
    fetchListings().then(data=>setListings(data));
  }

  async function handleUnclaim(id,claimerId,tot){
    // delete by both listing_id and id to be safe
    await db.from('claimers').delete().eq('listing_id',id).eq('id',claimerId);
    const listing=listings.find(s=>s.id===id);
    if(listing) await db.from('listings').update({spots:Math.min(tot,listing.spots+1)}).eq('id',id);
    removeSavedClaim(id);
    setMyClaims(p=>{const n={...p};delete n[id];return n;});
    refreshStats();
    fetchListings().then(data=>setListings(data));
  }

  async function handleInterest(id){
    if(myInterests[id])return;
    const listing=listings.find(s=>s.id===id);
    if(!listing)return;
    await db.from('listings').update({interested:listing.interested+1}).eq('id',id);
    // save to localStorage so it persists after refresh
    saveInterest(id);
    setMyInterests(p=>({...p,[id]:true}));
    setListings(p=>p.map(s=>s.id!==id?s:{...s,interested:s.interested+1}));
  }

  async function handleUninterest(id){
    if(!myInterests[id])return;
    const listing=listings.find(s=>s.id===id);
    if(!listing)return;
    await db.from('listings').update({interested:Math.max(0,listing.interested-1)}).eq('id',id);
    removeStoredInterest(id);
    setMyInterests(p=>{const n={...p};delete n[id];return n;});
    setListings(p=>p.map(s=>s.id!==id?s:{...s,interested:Math.max(0,s.interested-1)}));
  }

  async function handlePost(row){
    const {data,error}=await db.from('listings').insert([row]).select('*, claimers(*)').single();
    if(error){console.error(error);return;}
    setListings(p=>[{...data,claimers:[]},...p]);
    setPage('browse');refreshStats();
  }

  const tabBtn=(label,pg)=>E('button',{
    style:{flex:1,padding:'8px 10px',background:page===pg?gold:'none',border:'none',borderRadius:6,fontFamily:sans,fontSize:13,fontWeight:500,color:page===pg?'#1a1000':'#9ab88a',cursor:'pointer',transition:'all .2s'},
    onClick:()=>setPage(pg)
  },label);

  return E('div',{style:{background:bg,minHeight:'100vh',fontFamily:sans,color:'#e8ede3'}},
    !entered&&E(Gate,{onEnter:()=>setEntered(true)}),
    E(Header,{setPage}),
    E('div',{style:{maxWidth:900,margin:'0 auto',padding:'1.2rem 1rem'}},
      E('div',{style:{display:'flex',gap:4,marginBottom:'1.2rem',background:'rgba(0,0,0,0.25)',borderRadius:8,padding:4}},
        tabBtn('Browse open spots','browse'),
        tabBtn('Share my permit','share')
      ),
      page==='browse'&&E(Browse,{listings,loading,onClaim:handleClaim,onUnclaim:handleUnclaim,onInterest:handleInterest,onUninterest:handleUninterest,myClaims,myInterests}),
      page==='share'&&E(ShareForm,{onPost:handlePost}),
      page==='about'&&E(About)
    ),
    E(StatsFooter,{stats:stats})
  );
}


function StatsFooter({stats}){
  var items = [
    {label:'Permits shared', value:stats ? stats.permitsShared : '—'},
    {label:'Campsites shared', value:stats ? stats.campsitesShared : '—'},
    {label:'Hikers helped', value:stats ? stats.hikersHelped : '—'},
  ];
  return E('div',{style:{borderTop:'1px solid rgba(200,168,75,0.15)',marginTop:'2rem',paddingTop:'1.5rem',paddingBottom:'2rem'}},
    E('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16,maxWidth:560,margin:'0 auto',textAlign:'center'}},
      items.map(function(item){
        return E('div',{key:item.label},
          E('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:'clamp(1.6rem,4vw,2.2rem)',fontWeight:500,color:'#c8a84b',lineHeight:1}},item.value),
          E('div',{style:{fontSize:11,fontFamily:"'IBM Plex Mono',monospace",letterSpacing:'.08em',textTransform:'uppercase',color:'#7a8f72',marginTop:6}},item.label)
        );
      })
    )
  );
}
